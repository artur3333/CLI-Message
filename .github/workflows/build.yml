name: Build CLI-Message

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact_name: CLI-Message-Windows
            binary_name: CLI-Message.exe
            dist_binary: dist/CLI-Message.exe

          - name: Linux
            os: ubuntu-latest
            artifact_name: CLI-Message-Linux
            binary_name: CLI-Message
            dist_binary: dist/CLI-Message

          - name: macOS-arm64
            os: macos-26
            artifact_name: CLI-Message-macOS-arm64
            binary_name: CLI-Message
            dist_binary: dist/CLI-Message

          - name: macOS-x64
            os: macos-26-intel
            artifact_name: CLI-Message-macOS-x64
            binary_name: CLI-Message
            dist_binary: dist/CLI-Message

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm message.spec

      - name: Prepare artifact folder
        shell: bash
        run: |
          mkdir -p artifacts
          cp "${{ matrix.dist_binary }}" "artifacts/${{ matrix.binary_name }}"

      - name: Make Unix binary executable
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x "artifacts/${{ matrix.binary_name }}"

      - name: Package Windows zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "artifacts/CLI-Message.exe" -DestinationPath "artifacts/CLI-Message-Windows.zip" -Force

      - name: Package Linux tar.gz
        if: runner.os == 'Linux'
        shell: bash
        run: |
          tar -czf artifacts/CLI-Message-Linux-x86_64.tar.gz -C artifacts CLI-Message

      - name: Create Linux icon png
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python - <<'PY'
          from PIL import Image
          import os

          os.makedirs("packaging", exist_ok=True)

          try:
              img = Image.open("icon.ico")
              img.save("packaging/cli-message.png")
          except Exception:
              img = Image.new("RGBA", (256, 256), (30, 30, 30, 255))
              img.save("packaging/cli-message.png")
          PY

      - name: Build Linux deb
        if: runner.os == 'Linux'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          if [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="0.0.0"
          fi

          mkdir -p deb/DEBIAN
          mkdir -p deb/usr/local/bin
          mkdir -p deb/usr/share/applications
          mkdir -p deb/usr/share/icons/hicolor/256x256/apps

          cp dist/CLI-Message deb/usr/local/bin/cli-message
          chmod +x deb/usr/local/bin/cli-message

          cp packaging/cli-message.png deb/usr/share/icons/hicolor/256x256/apps/cli-message.png

          cat > deb/DEBIAN/control <<EOF
          Package: cli-message
          Version: $VERSION
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Artur
          Description: CLI-Message terminal chat app
          EOF

          cat > deb/usr/share/applications/cli-message.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=CLI-Message
          Comment=Terminal chat app
          Exec=cli-message
          Icon=cli-message
          Terminal=true
          Categories=Utility;
          EOF

          dpkg-deb --build deb "artifacts/CLI-Message-Linux-amd64.deb"

      - name: Build Linux AppImage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp dist/CLI-Message AppDir/usr/bin/CLI-Message
          chmod +x AppDir/usr/bin/CLI-Message

          cp packaging/cli-message.png AppDir/cli-message.png
          cp packaging/cli-message.png AppDir/usr/share/icons/hicolor/256x256/apps/cli-message.png

          cat > AppDir/cli-message.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=CLI-Message
          Comment=Terminal chat app
          Exec=CLI-Message
          Icon=cli-message
          Terminal=true
          Categories=Utility;
          EOF

          cp AppDir/cli-message.desktop AppDir/usr/share/applications/cli-message.desktop

          cat > AppDir/AppRun <<'EOF'
          #!/usr/bin/env bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/CLI-Message" "$@"
          EOF

          chmod +x AppDir/AppRun

          curl -L -o appimagetool.AppImage \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage

          chmod +x appimagetool.AppImage

          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool.AppImage AppDir artifacts/CLI-Message-Linux-x86_64.AppImage

      - name: Package macOS zip
        if: runner.os == 'macOS'
        shell: bash
        run: |
          zip -j "artifacts/${{ matrix.artifact_name }}.zip" "artifacts/CLI-Message"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            artifacts/*
            !artifacts/CLI-Message.exe
            !artifacts/CLI-Message
          if-no-files-found: error

  release:
    name: Upload files to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files

      - name: Show release files
        run: |
          find release-files -type f -maxdepth 4

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: release-files/**/*
